about_content: | # this will include new lines to allow paragraphs
  공격자 관점의 모의해킹에서 출발해 **제품 보안**과 **보안 자동화**로 전환한 8년차 Security Engineer입니다.

  AI Agent로 보안 리뷰·펜테스트 워크플로우를 통합해 며칠 단위로 걸리던 리뷰를 PR 단위로 압축했고, 위협 모델링·Bug Bounty 프로그램 설계·Shift Left SDLC 리뷰로 **설계 단계에서 위협을 줄이는 일**에 집중합니다.

  복잡하고 어려운 보안 문제를 도구 및 자동화로 풀어내는 것을 좋아하며, 보안 엔지니어는 코드 및 인프라 환경에 대해 상대적으로 높은 이해를 가지는 것이 중요한 덕목이라 믿고 끊임없이 학습하고 있습니다.

  <br><br>
  PDF로 출력된 이력서가 읽기 힘드시다면 [링크](https://kukuwhy.github.io/Resume)로 접근해주세요.

