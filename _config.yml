    content:
      - layout: left
        title: Prex (Flipster)
        link: flipster.io
        sub_title: Security Engineer, Security Team
        caption: 2024.07 - Present
        description: |
            <i>Prex Technologies Pte Ltd (IC, 2026.01—Present) · 프렉스코리아 (정규직, 2024.07—2025.12) · Singapore (Remote)</i>
            <br><i>※ 한국 법인 폐업에 따라 싱가포르 본사로 IC 계약 전환, 동일 팀·동일 업무 연속 수행</i>

            암호화폐 파생상품 거래소 Flipster 서비스 보안 전반 담당. 보안 리뷰부터 SOC, 인프라, 컴플라이언스까지 end-to-end 보안 체계 구축·운영.

            <b>3단계 Security Review Agent 파이프라인 구축 (AI 자동화)</b>
            -	Code Reviewer Agent — PR 단위 정적 분석 (인증·인가·입력 검증·민감 정보 노출)
            -	False Positive Validator Agent — 데이터 흐름·기존 보안 통제 역추적, 실제 익스플로잇 가능성 재검증
            -	Pentest Validator Agent — staging 환경 동적 PoC로 결론 확정
            -	며칠 단위로 걸리던 보안 리뷰를 PR 단위로 압축
            -	Stack: Claude AI Agent, FastAPI, n8n, GitHub Actions, Python, Jira API

            <b>거래소 보안 평가(CER) D → AAA 등급 견인 — 90점, 글로벌 10위</b>
            -	User Security 기능 신규 런칭 — Anti-Phishing Code, Device Management, Withdrawal Whitelist
            -	1년 내 D → AA(2025.05) → AAA(2025.08) 3단계 등급 견인
            -	평가 항목별 갭 분석 → 우선순위·로드맵 수립, Wallet/Backend/OpsX 팀과 cross-functional 추진
            -	평가 기관 Hacken과 커뮤니케이션, 리포트 검증

            <b>Bug Bounty 프로그램 런칭·운영 (HackenProof)</b>
            -	프로그램 정책 설계 — 범위, 보상 체계, Triage SLA, Disclosure Policy
            -	Severity별 보상 체계 — Critical(CVSS 9.0–10.0) $800–$3,000 차등 보상
            -	제보 트리아지 (재현·영향도·중복 판정), 글로벌 리서쳐 커뮤니케이션
            -	HackenProof·Hacken 외부 제휴로 Cer.live 평가·펜테스팅 연계

            <b>Security Agent Bot 개발 (MCP 기반 보안팀 운영 챗봇)</b>
            -	Okta·AWS·GCP·Datadog·Jira를 MCP로 연결, Slack 멘션 한 번으로 로그인 이력·IAM 권한·사고 티켓 처리
            -	안전 장치 코드 고정 — MCP 외부 호출 차단, shell/JS 실행 차단, 시크릿 마스킹, 화이트리스트
            -	Stack: TypeScript, Node.js, MCP, Claude Code SDK, Slack Bolt, Okta/AWS/GCP/Datadog/Jira API

            <b>SDLC 보안 리뷰 프로세스 정립 및 40+건 수행</b>
            -	PRD부터 출시 전까지 보안 검토 — Copy Trading, API Trading, Wallet, MFA, Passkey, OAuth 등
            -	Wallet Security Review 프로세스·템플릿 신규 수립 (자금 흐름·키 관리·서명 검증·출금 흐름 표준화)
            -	리뷰 결과 Notion 동기화·Jira 연동, Overdue Alert 자동화
            -	고위험 설계 이슈를 출시 전 차단

            <b>기타 — DDoS 대응 · IR · 위협 모델링 · 컴플라이언스 · 펜테스팅 관리</b>
            -	20+건 DDoS 공격 대응 — Cloudflare Managed/Custom Rule, JA3/JA4 fingerprint 봇 차단
            -	Wallet Kill Chain Drill 주관 — BTC 무단 출금 시나리오 tabletop, CISO 참석 cross-functional 회고
            -	Live IR — Malware 감염 대응 (CrowdStrike), 피싱 조사, 침입 시도 봉쇄
            -	Secret Audit 자동화 — Risk Scoring Engine, P0(Critical) 64건 포함 총 83건 식별
            -	외부 펜테스팅 관리 — ENKI, NCC Group, Whitehat과 웹/모바일/인프라 펜테스팅
            -	CIS Benchmark Golden Image — Packer + Ansible Lockdown 기반 EKS 노드 하드닝
            -	ISO 27001/27701 최초 심사·사후심사, VARA 라이선싱 후속(Post-IPA) 대응

